<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 340px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #020617;
      color: #e2e8f0;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #22d3ee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hidden { display: none; }

    .card {
      background: #0f172a;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid #1e293b;
    }

    .label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .value {
      font-size: 14px;
      font-weight: 500;
    }

    .summary {
      font-size: 13px;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      color: white;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #06b6d4;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
    }

    button:hover { background: #22d3ee; }

    button.secondary {
      background: transparent;
      color: #22d3ee;
      border: 1px solid #22d3ee;
    }

    #logout-btn {
      font-size: 12px;
      color: #f87171;
      cursor: pointer;
      background: none;
      border: none;
      width: auto;
      padding: 0;
    }

    .loader {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
    }

    .success-msg {
      color: #4ade80;
      font-size: 12px;
      text-align: center;
      margin-top: 5px;
    }

    .score-high { color: #4ade80; }
    .score-med { color: #fbbf24; }
    .score-low { color: #f87171; }
  </style>
</head>

<body>

  <h2>
    TruthLens
    <button id="logout-btn" class="hidden">Logout</button>
  </h2>

  <!-- 🔐 AUTH (only for saving) -->
  <div id="auth-state" class="hidden">
    <p style="font-size: 13px; color: #94a3b8;">
      Login to save this article.
    </p>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="login-btn">Login</button>
  </div>

  <!-- 🚀 ANALYZE ALWAYS AVAILABLE -->
  <div id="analyze-state">
    <p id="user-greeting" style="font-size: 12px; color: #22d3ee;"></p>
    <p style="font-size: 13px; color: #cbd5e1;">
      Scan this page for bias, tone, and credibility.
    </p>
    <button id="analyze-btn">Analyze This Article</button>
  </div>

  <!-- ⏳ LOADING -->
  <div id="loading-state" class="loader hidden">
    Analyzing page content...
  </div>

  <!-- 📊 RESULTS -->
  <div id="results-state" class="hidden">

    <div class="card">
      <div class="label">Credibility Score</div>
      <div class="value" id="res-score">--</div>
    </div>

    <div style="display: flex; gap: 8px;">
      <div class="card" style="flex: 1;">
        <div class="label">Bias</div>
        <div class="value" id="res-bias">--</div>
      </div>

      <div class="card" style="flex: 1;">
        <div class="label">Clickbait</div>
        <div class="value" id="res-clickbait">--</div>
      </div>
    </div>

    <div class="card">
      <div class="label">AI Summary</div>
      <div class="summary" id="res-summary">--</div>
    </div>

    <button id="save-btn">💾 Save to Library</button>
    <div id="save-status" class="success-msg hidden">Saved!</div>

    <button class="secondary" id="back-btn">Back</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

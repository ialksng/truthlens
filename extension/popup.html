<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #020617; 
      color: #e2e8f0;
    }
    h2 { margin-top: 0; font-size: 18px; color: #22d3ee; }
    .hidden { display: none; }
    .loader { text-align: center; color: #94a3b8; margin: 20px 0; }
    .card { background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #1e293b; }
    .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
    .value { font-size: 14px; font-weight: 500; }
    .score-high { color: #4ade80; }
    .score-med { color: #fbbf24; }
    .score-low { color: #f87171; }
    .summary { font-size: 12px; line-height: 1.5; color: #cbd5e1; }
    
    button { 
      width: 100%; padding: 10px; background: #06b6d4; color: #000; 
      border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #22d3ee; }

    /* Auth Styles */
    #auth-state input {
      width: 100%; padding: 8px; margin-bottom: 8px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 4px; color: #fff; box-sizing: border-box;
    }
  </style>
</head>
<body>

  <h2>TruthLens AI</h2>
  
  <div id="initial-state">
    <p style="font-size: 13px; color: #cbd5e1; margin-bottom: 16px;">Scan this page for bias and credibility scores.</p>
    <button id="analyze-btn">Analyze This Article</button>
  </div>

  <div id="loading-state" class="loader hidden">
    Analyzing page content...
  </div>

  <div id="results-state" class="hidden">
    <div class="card">
      <div class="label">Credibility Score</div>
      <div id="res-score" class="value">--</div>
    </div>
    <div style="display: flex; gap: 8px;">
      <div class="card" style="flex: 1;">
        <div class="label">Bias</div>
        <div id="res-bias" class="value" style="color: #22d3ee;">--</div>
      </div>
      <div class="card" style="flex: 1;">
        <div class="label">Clickbait</div>
        <div id="res-clickbait" class="value">--</div>
      </div>
    </div>
    <div class="card">
      <div class="label">AI Summary</div>
      <div id="res-summary" class="summary">--</div>
    </div>
  </div>

  <button id="save-btn" class="hidden">💾 Save Article</button>

  <div id="auth-state" class="hidden">
    <p style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">Login required to save articles.</p>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="login-btn">Login & Save</button>
  </div>

  <div id="save-status" class="hidden" style="color:#4ade80; font-size:12px; margin-top:8px; text-align:center;">
    ✓ Saved to your TruthLens profile
  </div>

  <script src="popup.js"></script>
</body>
</html>
